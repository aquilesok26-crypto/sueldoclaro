<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sueldo Claro - Comprobante Directo</title>
    <style>
        :root {
            --bg-principal: #121824;
            --bg-tarjeta: #1e2640;
            --primario: #ff4757;
            --secundario: #2ed573;
            --texto: #ffffff;
            --texto-mutado: #a5b1c2;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-principal);
            color: var(--texto);
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .app-header {
            text-align: center;
            margin-bottom: 20px;
            width: 100%;
            max-width: 480px;
        }

        .app-header h1 {
            color: var(--primario);
            font-size: 1.8rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .card {
            background-color: var(--bg-tarjeta);
            border-radius: 16px;
            padding: 20px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            margin-bottom: 15px;
        }

        h2 {
            font-size: 1.1rem;
            color: var(--texto-mutado);
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-group {
            margin-bottom: 15px;
        }

        .input-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 0.9rem;
            color: var(--texto-mutado);
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            background-color: #121824;
            border: 2px solid #2d3748;
            border-radius: 8px;
            color: white;
            font-size: 1.1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-group input:focus {
            border-color: var(--primario);
        }

        .resultado-box {
            background-color: rgba(255, 71, 87, 0.1);
            border: 1px dashed var(--primario);
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            margin-top: 20px;
        }

        .resultado-box .titulo {
            font-size: 0.9rem;
            color: var(--texto-mutado);
            text-transform: uppercase;
        }

        .resultado-box .monto {
            font-size: 2rem;
            font-weight: bold;
            color: var(--primario);
            margin-top: 5px;
        }

        .btn-whatsapp {
            width: 100%;
            background-color: var(--secundario);
            color: #121824;
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 15px;
            transition: opacity 0.2s;
        }

        .btn-whatsapp:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>

<div class="app-header">
    <h1>SueldoClaro <span>S</span></h1>
</div>

<div class="card">
    <h2>4. Comprobante Oficial</h2>
    
    <div class="input-group">
        <label>Nombre del Cliente:</label>
        <input type="text" id="cliente-nombre" placeholder="Ej: Juan Pérez" oninput="calcularDebido()">
    </div>

    <div class="input-group">
        <label>Monto Total ($):</label>
        <input type="number" id="monto-total" placeholder="0.00" step="0.01" oninput="calcularDebido()">
    </div>

    <div class="input-group">
        <label>Monto Entregado ($):</label>
        <input type="number" id="monto-entregado" placeholder="0.00" step="0.01" oninput="calcularDebido()">
    </div>

    <div class="resultado-box">
        <div class="titulo">Monto que quedó debiendo</div>
        <div class="monto" id="monto-debido-txt">$0,00</div>
    </div>

    <button class="btn-whatsapp" onclick="enviarTicketWhatsApp()">
        📩 Compartir Comprobante Directo
    </button>
</div>

<script>
    function calcularDebido() {
        const total = parseFloat(document.getElementById('monto-total').value) || 0;
        const entregado = parseFloat(document.getElementById('monto-entregado').value) || 0;
        
        let debido = total - entregado;
        if (debido < 0) debido = 0;

        document.getElementById('monto-debido-txt').innerText = `$${debido.toFixed(2).replace('.', ',')}`;
    }

    function enviarTicketWhatsApp() {
        const cliente = document.getElementById('cliente-nombre').value.trim() || "Cliente General";
        const total = parseFloat(document.getElementById('monto-total').value) || 0;
        const entregado = parseFloat(document.getElementById('monto-entregado').value) || 0;
        
        let debido = total - entregado;
        if (debido < 0) debido = 0;

        const hoy = new Date();
        const fechaStr = `${String(hoy.getDate()).padStart(2, '0')}/${String(hoy.getMonth() + 1).padStart(2, '0')}/${hoy.getFullYear()}`;

        // Construcción del Ticket de Texto Estilizado
        const lineaEspecial = "━━━━━━━━━━━━━━━━━━━━";
        const lineaDivisoria = "--------------------";
        
        let mensajeTicket = "";
        mensajeTicket += `${lineaEspecial}\n`;
        mensajeTicket += `   🧾 *SUELDO CLARO* 🧾\n`;
        mensajeTicket += `${lineaEspecial}\n`;
        mensajeTicket += `*Fecha:* ${fechaStr}\n`;
        mensajeTicket += `*Cliente:* ${cliente}\n`;
        mensajeTicket += `${lineaDivisoria}\n`;
        mensajeTicket += `*Monto Total:* $${total.toFixed(2).replace('.', ',')}\n`;
        mensajeTicket += `*Entrega:* $${entregado.toFixed(2).replace('.', ',')}\n`;
        mensajeTicket += `${lineaDivisoria}\n`;
        
        if (debido > 0) {
            mensajeTicket += `🔴 *QUEDÓ DEBIENDO:* $${debido.toFixed(2).replace('.', ',')}\n`;
        } else {
            mensajeTicket += `🟢 *CUENTA SALDADA*\n`;
        }
        
        mensajeTicket += `${lineaEspecial}\n`;
        mensajeTicket += `  ¡Gracias por su confianza!\n`;
        mensajeTicket += `${lineaEspecial}`;

        // Codificación universal segura para WhatsApp Link
        const mensajeCodificado = encodeURIComponent(mensajeTicket);
        const urlWhatsApp = `https://api.whatsapp.com/send?text=${mensajeCodificado}`;
        
        // Abre WhatsApp de una, saltando los bloqueos del celular
        window.open(urlWhatsApp, '_blank');
    }
</script>

</body>
</html>
