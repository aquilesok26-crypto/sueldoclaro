<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sueldo Claro - Comprobante Directo</title>
    <style>
        :root {
            --bg-principal: #121824;
            --bg-tarjeta: #1e2640;
            --primario: #ff4757;
            --secundario: #2ed573;
            --texto: #ffffff;
            --texto-mutado: #a5b1c2;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-principal);
            color: var(--texto);
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .app-header {
            text-align: center;
            margin-bottom: 20px;
            width: 100%;
            max-width: 480px;
        }

        .app-header h1 {
            color: var(--primario);
            font-size: 1.8rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .card {
            background-color: var(--bg-tarjeta);
            border-radius: 16px;
            padding: 20px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            margin-bottom: 15px;
        }

        h2 {
            font-size: 1.1rem;
            color: var(--texto-mutado);
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-group {
            margin-bottom: 15px;
        }

        .input-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 0.9rem;
            color: var(--texto-mutado);
        }

        .input-group input, .input-group select {
            width: 100%;
            padding: 12px;
            background-color: #121824;
            border: 2px solid #2d3748;
            border-radius: 8px;
            color: white;
            font-size: 1.1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-group input:focus, .input-group select:focus {
            border-color: var(--primario);
        }

        .row-fecha {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .row-fecha .input-group {
            flex: 1;
            margin-bottom: 0;
        }

        .resultado-box {
            background-color: rgba(255, 71, 87, 0.1);
            border: 1px dashed var(--primario);
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            margin-top: 20px;
        }

        .resultado-box .titulo {
            font-size: 0.9rem;
            color: var(--texto-mutado);
            text-transform: uppercase;
        }

        .resultado-box .monto {
            font-size: 2rem;
            font-weight: bold;
            color: var(--primario);
            margin-top: 5px;
        }

        .btn-whatsapp {
            width: 100%;
            background-color: var(--secundario);
            color: #121824;
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 15px;
            transition: opacity 0.2s;
        }

        .btn-whatsapp:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>

<div class="app-header">
    <h1>SueldoClaro <span>S</span></h1>
</div>

<div class="card">
    <h2>4. Comprobante Oficial</h2>
    
    <div class="input-group">
        <label>Nombre del Cliente:</label>
        <input type="text" id="cliente-nombre" placeholder="Ej: Juan Pérez" oninput="calcularDebido()">
    </div>

    <div class="row-fecha">
        <div class="input-group">
            <label>Mes:</label>
            <select id="select-mes">
                <option value="Enero">Enero</option>
                <option value="Febrero">Febrero</option>
                <option value="Marzo">Marzo</option>
                <option value="Abril">Abril</option>
                <option value="Mayo">Mayo</option>
                <option value="Junio" selected>Junio</option>
                <option value="Julio">Julio</option>
                <option value="Agosto">Agosto</option>
                <option value="Septiembre">Septiembre</option>
                <option value="Octubre">Octubre</option>
                <option value="Noviembre">Noviembre</option>
                <option value="Diciembre">Diciembre</option>
            </select>
        </div>
        <div class="input-group">
            <label>Año:</label>
            <select id="select-anio">
                <option value="2025">2025</option>
                <option value="2026" selected>2026</option>
                <option value="2027">2027</option>
            </select>
        </div>
    </div>
